<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/src/assets/sun-logo.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>4DA</title>
    <script>
      // Apply the persisted theme BEFORE first paint (no flash of wrong theme).
      // Mirrors src/lib/theme.ts — keep the key in sync.
      (function () {
        try {
          if (localStorage.getItem('4da-theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
          }
        } catch (_) { /* storage unavailable — default dark */ }
      })();
    </script>
    <style>
      /* Prevent wrong-theme flash on load (theme attr is set above, pre-paint) */
      html, body {
        background-color: #0A0A0A;
        margin: 0;
        padding: 0;
      }
      #root {
        background-color: #0A0A0A;
        min-height: 100vh;
      }
      html[data-theme='light'], html[data-theme='light'] body, html[data-theme='light'] #root {
        background-color: #F6F5F2;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
